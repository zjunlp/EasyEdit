# General 
model_name_or_path: ../hf_models/gemma-2-9b-it
torch_dtype: bfloat16
device: cuda:0
seed: 42   
use_chat_template: true
system_prompt: ''  

# Generate Vector 
# The `steer_train_hparam_paths` and `steer_vector_output_dirs` are corresponding line by line.
steer_train_hparam_paths:
 - hparams/Steer/experiment_hparams/steer_eval/gemma-it/caa/generate_caa.yaml

steer_train_dataset: steer_eval
save_vectors: true # When running steer_eval, vectors do not need to be saved
steer_vector_output_dirs: 
 - vectors/gemma-2-9b-it/case_19

# Apply Vector 
# The `apply_steer_hparam_paths` and `steer_vector_load_dir` are corresponding line by line.
apply_steer_hparam_paths:
 - hparams/Steer/experiment_hparams/steer_eval/gemma-it/caa/apply_caa.yaml

steer_vector_load_dir: 
 - vectors/gemma-2-9b-it/case_19/steer_eval/caa_vector


# Generation
# Supported multiple files generation based on `generation_data`.
generation_data: 
 - steer_eval
generation_data_size: null
generation_output_dir: generation/gemma-2-9b-it/case_19/steer_eval/caa 

num_responses: 1
steer_from_end_position: false

generate_orig_output: true
generation_params:      #change
  max_new_tokens: 256   
  temperature: 0      
  do_sample: false 

